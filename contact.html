<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="image/logo.jpeg">

        </div>
        <ul class="links">
            <li><a href="index.html">Home</a></li>
            <li><a href="poster.html">Poster</a></li>
            <li><a href="manga.html">Manga</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </div>
    <!-- contact section -->
     <section class="poster-sec">
        <h2>Contact Us</h2>
        <p>Have questions or want to order? Send us a message!</p>


     </section>
     <div class="contact-box">
        <!-- form -->
         <form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="number"placeholder="your number" required>
            <textarea placeholder="Your message" required></textarea>
            <button class="hero-btn">Send Message</button>
         </form>
         <!-- Info -->
          <div class="contact-info">
            <p><i class="fas fa-envelope"></i></p>
            <p><i class="fas fa-phone"></i></p>
            <p><i class="fas fa-location-dot"></i></p>

          </div>

     </div>
     <!-- footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-logo">
                <img src="image/logo.jpeg" alt="logo" class="footer-logo" >
                <h2>Serene Store</h2>
                <p>Bringing anime vibes to your word</p>

            </div>


            <div class="footer-links">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="poster.html">Poster</a></li>
                    <li><a href="manga.html">Manga</a></li>
                    <li><a href="contact.html">Contact</a></li>

                </ul>

            </div>
            <div class="footer-social">
                <h3>Follow Me</h3>
                <a href="">Instagram</a>
                <a href="">Youtube</a>
                <a href="">Facebook</a>

            </div>
        </div>
        <p class="copyright">&copy; 2026 Serene Store | All Rights Reserved</p>

    </footer>


    
</body>
</html>
